<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit User - User Management System</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <button class="btn btn-secondary" onclick="goHome()">Back to Home</button>

      <div class="header">
        <h1>Edit User</h1>
        <p>Update user information</p>
      </div>

      <div class="main-section">
        <div class="form-group">
          <label for="userId">User ID:</label>
          <input type="text" id="userId" class="form-input" disabled />
        </div>

        <div class="form-group">
          <label for="username">Username:</label>
          <input type="text" id="username" class="form-input" placeholder="Please enter username" required />
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" class="form-input" placeholder="Please enter email address" required />
        </div>

        <button type="button" class="btn btn-primary" id="submitUpdate">Update User</button>
      </div>
    </div>

    <div class="message" id="message"></div>
    <script src="../dist/script.js"></script>
  </body>
</html>
