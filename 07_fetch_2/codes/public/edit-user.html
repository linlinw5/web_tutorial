<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑用户 - 用户管理系统</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <button class="btn btn-secondary" onclick="goHome()">返回首页</button>

        <div class="header">
            <h1>编辑用户</h1>
            <p>修改用户信息</p>
        </div>

        <div class="main-section">
            <div class="form-group">
                <label for="userId">用户ID：</label>
                <input type="text" id="userId" class="form-input" disabled>
            </div>

            <div class="form-group">
                <label for="username">用户名：</label>
                <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
            </div>

            <div class="form-group">
                <label for="email">邮箱：</label>
                <input type="email" id="email" class="form-input" placeholder="请输入邮箱地址" required>
            </div>

            <button type="button" class="btn btn-primary" id="submitUpdate">更新用户</button>
        </div>
    </div>

    <div class="message" id="message"></div>
    <script src="../dist/script.js"></script>
</body>
</html>
