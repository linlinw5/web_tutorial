services:
  postgres:
    image: postgres:16-alpine
    container_name: easyblog_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Cisco123
      POSTGRES_DB: db6
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
