<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CDN 练习</title>
    <!-- 在这里引入 Tailwind CDN -->

</head>
<body>
    <!-- 练习：用 Tailwind 工具类为下面的元素添加样式 -->

    <!-- 1. 让这段文字变成红色、2xl 字号、绿色背景 -->
    <p>Hello Tailwind!</p>

    <!-- 2. 创建一个蓝色按钮，白色文字，有圆角，悬停时颜色加深 -->
    <button>点我</button>

    <!-- 3. 创建一个 flex 容器，里面放 3 个色块，水平排列并居中 -->
    <div>
        <div>色块 1</div>
        <div>色块 2</div>
        <div>色块 3</div>
    </div>
</body>
</html>
